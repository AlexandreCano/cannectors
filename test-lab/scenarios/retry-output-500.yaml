name: retry-output-500
description: Output retries after 500 then succeeds.
pipeline: test-lab/pipelines/retry-output-500.yaml
expect_status: success
assertions:
  - http_count_eq:
      method: POST
      path: /reliability/destination/500-then-200
      status: 500
      expected: 1
  - http_count_ge:
      method: POST
      path: /reliability/destination/500-then-200
      status: 200
      expected: 1
