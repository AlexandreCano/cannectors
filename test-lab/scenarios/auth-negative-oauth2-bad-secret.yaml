name: auth-negative-oauth2-bad-secret
description: Wrong OAuth2 client secret returns token 401 and protected endpoint is not called.
pipeline: test-lab/pipelines/auth-negative-oauth2-bad-secret.yaml
expect_status: error
assertions:
  - http_count_eq:
      method: POST
      path: /auth/oauth2/token
      status: 401
      expected: 1
  - http_count_eq_zero:
      method: GET
      path: /auth/oauth2/protected
  - log_contains: "failed to obtain OAuth2 access token"
