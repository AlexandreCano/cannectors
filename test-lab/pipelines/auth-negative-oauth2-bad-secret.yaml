name: auth-negative-oauth2-bad-secret
version: 1.0.0
description: Negative — OAuth2 client secret is wrong; the token endpoint returns 401 and the pipeline fails.
tags:
  - test-lab
  - auth
  - negative
  - oauth2
input:
  type: httpPolling
  schedule: "* * * * * *"
  endpoint: http://localhost:18080/auth/oauth2/protected
  dataField: items
  authentication:
    type: oauth2
    credentials:
      tokenUrl: http://localhost:18080/auth/oauth2/token
      clientId: lab-client-id
      clientSecret: WRONG-SECRET
filters: []
output:
  type: httpRequest
  endpoint: http://localhost:18080/auth/destination/public
  method: POST
  headers:
    Content-Type: application/json
