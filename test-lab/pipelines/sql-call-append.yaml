name: sql-call-append
version: 1.0.0
description: Append product reference rows under the 'reference' key on each line.
tags:
  - test-lab
  - sql_call
input:
  type: httpPolling
  schedule: "* * * * * *"
  endpoint: http://localhost:18080/source/enrichment/products
  dataField: products
filters:
  - type: sql_call
    connectionString: postgres://cannectors_test:cannectors_test@localhost:15432/cannectors_test?sslmode=disable
    driver: postgres
    query: |
      SELECT product_name, category, unit_price, active
      FROM product_reference
      WHERE sku = {{record.sku}}
      LIMIT 1
    mergeStrategy: append
    resultKey: reference
    cache:
      enabled: true
      maxSize: 100
      defaultTTL: 60
      key: "sku:{{record.sku}}"
output:
  type: httpRequest
  endpoint: http://localhost:18080/destination/enrichment/append
  method: POST
  headers:
    Content-Type: application/json
