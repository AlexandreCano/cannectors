name: auth-input-bearer
description: Bearer-protected source returns 200 → destination receives the batch.
pipeline: test-lab/pipelines/auth-input-bearer.yaml
expect_status: success
assertions:
  - http_count_eq:
      method: GET
      path: /auth/source/bearer
      headers:
        Authorization: Bearer lab-bearer-token
      status: 200
      expected: 1
  - http_count_ge:
      method: POST
      path: /auth/destination/public
      status: 200
      expected: 1
