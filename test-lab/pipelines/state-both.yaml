name: state-both
version: 1.0.0
description: HTTP polling with timestamp + ID state persistence enabled together.
tags:
  - test-lab
  - state
input:
  type: httpPolling
  schedule: "* * * * * *"
  endpoint: http://localhost:18080/source/state/events
  dataField: events
  statePersistence:
    timestamp:
      enabled: true
      queryParam: updated_after
    id:
      enabled: true
      field: event.id
      queryParam: after_id
    storagePath: ./test-lab/state
filters: []
output:
  type: httpRequest
  endpoint: http://localhost:18080/destination/state/both
  method: POST
  headers:
    Content-Type: application/json
