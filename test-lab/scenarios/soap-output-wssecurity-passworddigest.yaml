name: soap-output-wssecurity-passworddigest
description: SOAP output emits a WS-Security UsernameToken PasswordDigest header.
pipeline: test-lab/pipelines/soap-output-wssecurity-passworddigest.yaml
expect_status: success
assertions:
  - http_count_eq:
      method: POST
      path: /soap/secure/orders
      body_contains: "#PasswordDigest"
      status: 200
      expected: 2
  - http_count_eq:
      method: POST
      path: /soap/secure/orders
      body_contains: Nonce
      status: 200
      expected: 2

