name: soap-output-wssecurity-passwordtext
version: 1.0.0
description: Test-lab SOAP output with WS-Security PasswordText.
tags:
  - test-lab
  - soap
input:
  type: httpPolling
  schedule: "* * * * * *"
  endpoint: http://localhost:18080/reliability/source/records
  dataField: records
filters: []
output:
  type: soapRequest
  endpoint: http://localhost:18080/soap/secure/orders
  soapAction: urn:SubmitOrder
  operation: SubmitOrder
  requestMode: single
  body: |
    <SubmitOrder>
      <OrderId>{{record.id}}</OrderId>
    </SubmitOrder>
  wsSecurity:
    username: lab-soap-user
    password: lab-soap-password
    passwordType: PasswordText
    mustUnderstand: true

