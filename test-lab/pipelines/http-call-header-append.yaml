name: http-call-header-append
version: 1.0.0
description: Enrich orders by GET /enrichment/by-header (X-Customer-Id), append response under 'permissions_lookup'.
tags:
  - test-lab
  - http_call
input:
  type: httpPolling
  schedule: "* * * * * *"
  endpoint: http://localhost:18080/source/enrichment/orders
  dataField: orders
filters:
  - type: http_call
    onError: skip
    endpoint: http://localhost:18080/enrichment/by-header
    method: GET
    keys:
      - field: customer.id
        paramType: header
        paramName: X-Customer-Id
    mergeStrategy: append
output:
  type: httpRequest
  endpoint: http://localhost:18080/destination/enrichment/http-append
  method: POST
  headers:
    Content-Type: application/json
