name: soap-polling-v11
description: SOAP 1.1 input fetches two records and sends them to an HTTP batch destination.
pipeline: test-lab/pipelines/soap-polling-v11.yaml
expect_status: success
assertions:
  - http_count_eq:
      method: POST
      path: /soap/orders/v11
      body_contains: ListOrders
      status: 200
      expected: 1
  - http_count_eq:
      method: POST
      path: /soap/destination/orders
      body_contains: SOAP-1
      status: 200
      expected: 1

