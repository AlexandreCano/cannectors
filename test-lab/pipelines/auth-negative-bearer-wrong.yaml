name: auth-negative-bearer-wrong
version: 1.0.0
description: Negative — bearer token is wrong; the source returns 401 and the pipeline fails explicitly.
tags:
  - test-lab
  - auth
  - negative
input:
  type: httpPolling
  schedule: "* * * * * *"
  endpoint: http://localhost:18080/auth/source/bearer
  dataField: customers
  authentication:
    type: bearer
    credentials:
      token: not-the-right-token
filters: []
output:
  type: httpRequest
  endpoint: http://localhost:18080/auth/destination/public
  method: POST
  headers:
    Content-Type: application/json
