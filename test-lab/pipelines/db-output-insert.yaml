name: db-output-insert
version: 1.0.0
description: Read customers from HTTP and INSERT into dest_customers via parameterized template.
tags:
  - test-lab
  - database
  - output
input:
  type: httpPolling
  schedule: "* * * * * *"
  endpoint: http://localhost:18080/source/db-feed/customers
filters: []
output:
  type: database
  connectionString: postgres://cannectors_test:cannectors_test@localhost:15432/cannectors_test?sslmode=disable
  query: "INSERT INTO dest_customers (external_id, email, full_name, segment, source_updated_at, synced_at) VALUES ({{record.externalId}}, {{record.email}}, {{record.fullName}}, {{record.segment}}, {{record.sourceUpdatedAt}}, NOW())"
