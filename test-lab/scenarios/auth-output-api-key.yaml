name: auth-output-api-key
description: Output sends the expected API key to the protected destination.
pipeline: test-lab/pipelines/auth-output-api-key.yaml
expect_status: success
assertions:
  - http_count_eq:
      method: GET
      path: /auth/source/orders
      status: 200
      expected: 1
  - http_count_eq:
      method: POST
      path: /auth/destination/orders
      headers:
        X-API-Key: lab-destination-api-key
      status: 200
      expected: 1
