name: sql-call-merge
version: 1.0.0
description: Enrich orders by deep-merging customer reference rows into the record.
tags:
  - test-lab
  - sql_call
input:
  type: httpPolling
  schedule: "* * * * * *"
  endpoint: http://localhost:18080/source/enrichment/orders
  dataField: orders
filters:
  - type: sql_call
    connectionString: postgres://cannectors_test:cannectors_test@localhost:15432/cannectors_test?sslmode=disable
    driver: postgres
    query: |
      SELECT segment, region, active
      FROM customer_reference
      WHERE external_id = {{record.customer.id}}
      LIMIT 1
    mergeStrategy: merge
    cache:
      enabled: true
      maxSize: 100
      defaultTTL: 60
      key: "customer:{{record.customer.id}}"
output:
  type: httpRequest
  endpoint: http://localhost:18080/destination/enrichment/merge
  method: POST
  headers:
    Content-Type: application/json
