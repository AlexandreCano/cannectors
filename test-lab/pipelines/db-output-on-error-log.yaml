name: db-output-on-error-log
version: 1.0.0
description: |-
  Feed contains a record missing the `email` field. With onError=log, the offending
  record is logged but the pipeline continues; the other rows still land in
  dest_customers.
tags:
  - test-lab
  - database
  - output
  - on-error
input:
  type: httpPolling
  schedule: "* * * * * *"
  endpoint: http://localhost:18080/source/db-feed/customers-with-missing
filters: []
output:
  type: database
  connectionString: postgres://cannectors_test:cannectors_test@localhost:15432/cannectors_test?sslmode=disable
  transaction: false
  onError: log
  query: "INSERT INTO dest_customers (external_id, email, full_name, segment, source_updated_at, synced_at) VALUES ({{record.externalId}}, {{record.email}}, {{record.fullName}}, {{record.segment}}, {{record.sourceUpdatedAt}}, NOW())"
