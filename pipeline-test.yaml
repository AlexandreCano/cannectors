name: test
version: "1.0.0"
description: Test for the Cannectors platform

input:
  type: httpPolling
  endpoint: http://localhost:8080/api/v1/customers?modified_since=2025-01-01T00:00:00Z
  schedule: "*/1 * * * *"  # Every 5 minutes
  dataField: "customers"  # Extrait le tableau
#    authentication:
#      type: bearer
#      credentials:
#        token: ${API_TOKEN}

filters:
    # 1. Map core fields from input to output structure
    - type: mapping
      name: map-core-fields
      mappings:
        - source: erp_customer_id
          target: external_id
          onMissing: fail
        - source: modified_at
          target: source_last_modified_at

    - type: condition
      expression: "status == 'ACTIVE'"
      then:
        - type: set
          target: is_active
          value: true
      else:
        - type: set
          target: is_active
          value: false
      onTrue: continue
      onFalse: continue

    - type: set
      target: source_system
      value: Cannectors


output:
  type: httpRequest
  endpoint: "http://localhost:8080/api/v2/customers/external/{{external_id}}"
  method: PUT

  headers:
    Content-Type: "application/json"
    Idempotency-Key: "idKey"
  request:
    requestMode: single
    pathParams:
      external_id: external_id
