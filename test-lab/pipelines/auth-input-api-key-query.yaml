name: auth-input-api-key-query
version: 1.0.0
description: HTTP polling input authenticated with api-key in query param.
tags:
  - test-lab
  - auth
input:
  type: httpPolling
  schedule: "* * * * * *"
  endpoint: http://localhost:18080/auth/source/api-key-query
  dataField: customers
  authentication:
    type: api-key
    credentials:
      key: lab-api-key-query
      location: query
      paramName: api_key
filters: []
output:
  type: httpRequest
  endpoint: http://localhost:18080/auth/destination/public
  method: POST
  headers:
    Content-Type: application/json
