name: condition-nested-routing
version: 1.0.0
description: Route records with condition filters and nested filter modules.
tags:
  - condition
  - nested-filters
input:
  type: httpPolling
  schedule: "*/30 * * * *"
  endpoint: https://source.example.com/api/payments
  dataField: payments
filters:
  - type: condition
    expression: status == "paid" && amount > 0
    then:
      - type: set
        target: routing.bucket
        value: billable
      - type: mapping
        mappings:
          - source: id
            target: payment.id
          - source: amount
            target: payment.amount
    else:
      - type: set
        target: routing.bucket
        value: review
      - type: remove
        targets:
          - card.number
          - card.cvv
output:
  type: httpRequest
  endpoint: https://destination.example.com/api/payments/routed
  method: POST
  requestMode: batch
