name: cannectors-test-lab

services:
  postgres:
    image: postgres:16-alpine
    container_name: cannectors-test-lab-postgres
    environment:
      POSTGRES_DB: cannectors_test
      POSTGRES_USER: cannectors_test
      POSTGRES_PASSWORD: cannectors_test
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cannectors_test -d cannectors_test"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  wiremock:
    image: wiremock/wiremock:3.9.2
    container_name: cannectors-test-lab-wiremock
    ports:
      - "18080:8080"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro
      - ./wiremock/__files:/home/wiremock/__files:ro
    command:
      - "--local-response-templating"
      - "--verbose"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/__admin/mappings >/dev/null || wget -q -O - http://localhost:8080/__admin/mappings >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  postgres-data:
