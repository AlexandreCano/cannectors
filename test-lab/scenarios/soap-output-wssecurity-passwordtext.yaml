name: soap-output-wssecurity-passwordtext
description: SOAP output emits a WS-Security UsernameToken PasswordText header.
pipeline: test-lab/pipelines/soap-output-wssecurity-passwordtext.yaml
expect_status: success
assertions:
  - http_count_eq:
      method: POST
      path: /soap/secure/orders
      body_contains: "#PasswordText"
      status: 200
      expected: 2
  - http_count_eq:
      method: POST
      path: /soap/secure/orders
      body_contains: lab-soap-user
      status: 200
      expected: 2

